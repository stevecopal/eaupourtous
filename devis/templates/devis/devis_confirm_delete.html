{% extends "base_dashboard.html" %}
{% load i18n %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-8">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-red-50 px-6 py-4 border-b border-red-100">
            <div class="flex items-center gap-3">
                <div class="flex-shrink-0">
                    <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
                    </div>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-red-800">{% trans "Confirmation de suppression" %}</h1>
                    <p class="text-sm text-red-600">{% trans "Cette action est irréversible" %}</p>
                </div>
            </div>
        </div>
            
            <div class="flex gap-3">
                <form method="post" class="flex-1">
                    {% csrf_token %}
                    <button type="submit" 
                            class="w-full bg-red-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-red-700 transition-colors focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">
                        <i class="fas fa-trash-alt mr-2"></i>
                        {% trans "Oui, supprimer" %}
                    </button>
                </form>
                <a href="{% url 'devis_list' %}" 
                   class="flex-1 text-center bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-bold hover:bg-gray-300 transition-colors">
                    <i class="fas fa-times mr-2"></i>
                    {% trans "Non, annuler" %}
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
